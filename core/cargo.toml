[package]
name = "warmot-core"
version = "0.1.0"
edition = "2021"

[lib]
name = "warmot"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = "thin"        # link-time optimisation across crates
codegen-units = 1   # slower compile, faster binary

[dependencies]
tokio                = { version = "1", features = ["full"] }
reqwest              = { version = "0.12", features = ["json"] }
serde                = { version = "1", features = ["derive"] }
serde_json           = "1"
aws-sdk-s3           = "1"
aws-config           = { version = "1", features = ["behavior-version-latest"] }
aws-credential-types = "1"    
thiserror            = "1"      
bytes                = "1"   
dotenvy              = "0.15"
hayro-jpeg2000       = { version = "0.3", features = ["image"] }
image                = { version = "0.25", default-features = false, features = ["png"] }
png                  = "0.17" 

[features]
default  = []
parallel = ["dep:rayon"]

[dependencies.rayon]
version  = "1"
optional = true