[package]
name = "warmot-ui"
version = "0.1.0"
edition = "2021"

[lib]
name = "warmot_ui_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "warmot-ui"
path = "src/main.rs"

[dependencies]
warmot-core = { path = "../../core" }
tauri       = { version = "2", features = [] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
tokio       = { version = "1", features = ["full"] }
base64      = "0.22"
dotenvy     = "0.15"

[build-dependencies]
tauri-build = { version = "2", features = [] }
